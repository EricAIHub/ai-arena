# AI Arena - 故事接龙场景配置

name: "故事接龙"
emoji: "📖"
description: "接力创作，看谁的故事最精彩"
min_players: 3
max_players: 6

# 故事开头（随机选择）
starters:
  - "深夜，一列火车在隧道里突然停了。窗外一片漆黑，车厢里的灯也开始闪烁..."
  - "我在旧书店的角落发现了一本没有作者名字的书，翻开第一页，上面写着：'找到这本书的人，请继续写下去...'"
  - "地球上最后一个人独自坐在房间里，这时，忽然响起了敲门声..."
  - "当我醒来时，发现自己躺在一片完全陌生的草原上，天空中有两个月亮..."
  - "那个快递包裹上没有寄件人信息，只有一个标签：'请在满月之夜打开'..."

# 游戏规则
rules:
  segments_per_player: 2    # 每人接几轮
  min_words: 50             # 每段最少字数
  max_words: 200            # 每段最多字数
  voting: "ai"              # "ai" 或 "audience"

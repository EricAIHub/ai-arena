# AI Arena - 代码对决场景配置

name: "代码对决"
emoji: "💻"
description: "同题竞赛，比比谁的代码更优雅"
min_players: 2
max_players: 6

# 题目列表
challenges:
  - title: "实现快速排序"
    description: "实现一个快速排序算法，对整数数组进行升序排序。"
    test_cases:
      - input: "[3,6,8,10,1,2,1]"
        output: "[1,1,2,3,6,8,10]"
      - input: "[5,4,3,2,1]"
        output: "[1,2,3,4,5]"
  
  - title: "实现 LRU 缓存"
    description: "实现一个 LRU（最近最少使用）缓存，支持 get 和 put 操作。"
    test_cases:
      - input: "put(1,1), put(2,2), get(1), put(3,3), get(2)"
        output: "1, -1"
  
  - title: "两数之和"
    description: "给定一个整数数组和一个目标值，找出数组中和为目标值的两个数的索引。"
    test_cases:
      - input: "nums=[2,7,11,15], target=9"
        output: "[0,1]"

# 评判维度
judging:
  - "正确性"
  - "代码质量"
  - "效率"
  - "创意"

# AI Arena - 知识问答场景配置

name: "知识问答"
emoji: "🧠"
description: "AI 抢答竞赛，比比谁更博学"
min_players: 2
max_players: 6

# 题目分类
categories:
  - name: "历史"
    emoji: "📜"
  - name: "科学"
    emoji: "🔬"
  - name: "编程"
    emoji: "💻"
  - name: "数学"
    emoji: "🔢"
  - name: "常识"
    emoji: "💡"

# 游戏规则
rules:
  rounds: 10            # 总题目数
  time_limit: 30        # 每题思考时间（秒）
  scoring:
    correct: 10         # 答对得分
    fast_bonus: 5       # 最快答对额外分
    wrong: 0            # 答错不得分

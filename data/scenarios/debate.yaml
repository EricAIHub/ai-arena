# AI Arena - 辩论赛场景配置

name: "辩论赛"
emoji: "🗣️"
description: "正方 VS 反方，三轮发言，AI 裁判评判胜负"
min_players: 2
max_players: 2

# 内置话题列表
topics:
  - "Python vs Java 哪个更适合编程入门？"
  - "AI 会取代程序员吗？"
  - "远程办公比坐班更高效？"
  - "开源软件比商业软件更好？"

# 角色配置
roles:
  pro:
    name: "正方"
    emoji: "🔴"
    side: "pro"
    description: "支持辩题观点的一方，需要提出有力的论据进行论证。"

  con:
    name: "反方"
    emoji: "🔵"
    side: "con"
    description: "反对辩题观点的一方，需要提出有力的反驳和对立论据。"

# 阶段流程
phases:
  - name: "discussion"
    display: "📢 辩论发言"
    description: "正反方交替发言，共 3 轮"

  - name: "result"
    display: "⚖️ 裁判评判"
    description: "AI 裁判从论点质量、逻辑严密性、反驳力度三个维度评判胜负"

# 胜利条件
win_conditions:
  pro: "由 AI 裁判评判正方获胜。"
  con: "由 AI 裁判评判反方获胜。"
  judge: "裁判从论点质量、逻辑严密性、反驳力度三个维度综合评判。"

# 辩论规则
rules:
  rounds: 3
  turn_order: "正方先发言，反方后发言"
  judge_dimensions:
    - "论点质量"
    - "逻辑严密性"
    - "反驳力度"

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Arena</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #09090b;
            color: #e4e4e7;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        .splash-logo {
            font-size: 72px;
            line-height: 1;
            animation: pulse 2s ease-in-out infinite;
        }
        .splash-title {
            font-size: 32px;
            font-weight: 700;
            margin-top: 16px;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #a78bfa, #818cf8, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .splash-loader {
            margin-top: 40px;
            display: flex;
            gap: 8px;
        }
        .splash-loader .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #6366f1;
            animation: bounce 1.4s ease-in-out infinite;
        }
        .splash-loader .dot:nth-child(2) { animation-delay: 0.2s; }
        .splash-loader .dot:nth-child(3) { animation-delay: 0.4s; }
        .splash-footer {
            position: absolute;
            bottom: 32px;
            font-size: 13px;
            color: #52525b;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.08); opacity: 0.85; }
        }
        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
            40% { transform: translateY(-16px); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="splash-logo">⚔️</div>
    <div class="splash-title">AI Arena</div>
    <div class="splash-loader">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>
    <div class="splash-footer">Loading...</div>
</body>
</html>
